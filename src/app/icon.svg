<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="c">
      <rect width="100" height="100" rx="20"/>
    </clipPath>
    <clipPath id="g">
      <polygon points="0,0 100,0 100,26 26,100 0,100"/>
    </clipPath>
  </defs>

  <g clip-path="url(#c)">

    <!-- Gold background (lower-right) -->
    <rect width="100" height="100" fill="#C9A030"/>

    <!-- Dark green upper-left polygon -->
    <polygon points="0,0 100,0 100,26 26,100 0,100" fill="#0A532A"/>

    <!-- White diagonal stripes — clipped to green area, running SW→NE -->
    <g clip-path="url(#g)">
      <!-- Stripe 1 (leftmost) -->
      <polygon points="4,100 28,56 44,56 20,100" fill="white"/>
      <!-- Stripe 2 -->
      <polygon points="26,100 50,56 66,56 42,100" fill="rgba(255,255,255,0.82)"/>
      <!-- Stripe 3 -->
      <polygon points="48,84 70,40 86,40 64,84" fill="rgba(255,255,255,0.68)"/>
      <!-- Stripe 4 (rightmost, partial) -->
      <polygon points="68,70 90,26 104,26 82,70" fill="rgba(255,255,255,0.50)"/>
    </g>

    <!-- Small dark square (lower-left of green area) -->
    <rect x="6" y="76" width="11" height="11" rx="2" fill="#071810"/>

  </g>
</svg>
